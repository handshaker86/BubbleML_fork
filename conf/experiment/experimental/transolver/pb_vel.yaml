torch_dataset_name: vel_dataset

distributed: False

train:
  max_epochs: 25
  batch_size: 4
  shuffle_data: True
  time_window: 10
  future_window: 10
  push_forward_steps: 1
  use_coords: True
  noise: True
  downsample_factor: 1

model:
  model_name: transolver
  n_hidden: 256
  n_layers: 5
  n_head: 8
  slice_num: 32
  mlp_ratio: 1
  dropout: 0.0
  act: gelu

optimizer:
  initial_lr: 1e-3
  weight_decay: 1e-5

lr_scheduler:
  name: cosine
  eta_min: 1e-6
